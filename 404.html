<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Revèla</title>
  <link rel="icon" type="image/png" href="Website essentials/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 24px;
      padding: 40px var(--container-pad);
      background: var(--dark);
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(80px, 15vw, 160px);
      font-weight: 300;
      line-height: 1;
      color: var(--magenta);
    }
    .error-page h1 { color: var(--white); }
    .error-page p  { color: rgba(255,255,255,0.5); max-width: 400px; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="t-h2" style="color:var(--white)">Page not found.</h1>
    <p class="t-body">This page doesn't exist or may have moved. Let's get you back on track.</p>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px">
      <a href="/" class="btn btn-primary">Back to Home</a>
      <a href="/services" class="btn btn-outline">View Services</a>
    </div>
  </div>
</body>
</html>
